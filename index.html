class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, message: '' };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, message: error?.message || 'שגיאה לא צפויה' };
  }
  componentDidCatch(error, info) {
    try { console.error('NetMaster error:', error, info); } catch {}
  }
  render() {
    if (this.state.hasError) {
      return (
        <div className="min-h-screen bg-slate-950 text-white p-6 flex items-center justify-center" dir="rtl">
          <div className="max-w-xl w-full rounded-3xl bg-slate-900 border border-pink-500/40 p-6 text-center">
            <div className="text-3xl font-black text-pink-300 mb-3">אירעה תקלה בתצוגה</div>
            <p className="text-slate-300 mb-5">המערכת עצרה את השגיאה כדי שהדף לא ייתקע. אפשר לרענן ולהמשיך ללמוד.</p>
            <button onClick={() => window.location.reload()} className="px-6 py-3 rounded-xl bg-cyan-600 hover:bg-cyan-500 font-bold">רענון הדף</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const safeGet = async (key, def = null) => {
  try {
    if (window.storage?.get) {
      const r = await window.storage.get(key);
      return r ? JSON.parse(r.value) : def;
    }
    const raw = window.localStorage?.getItem(key);
    return raw ? JSON.parse(raw) : def;
  } catch {
    return def;
  }
};
const safeSet = async (key, value) => {
  try {
    const serialized = JSON.stringify(value);
    if (window.storage?.set) {
      await window.storage.set(key, serialized);
    } else {
      window.localStorage?.setItem(key, serialized);
    }
  } catch {}
};

/* =========================================================
   ============== MATH / IP HELPERS ========================
   ========================================================= */
const toBin = (n) => n.toString(2).padStart(8, '0');
const ipToBinary = (ip) => ip.split('.').map(o => toBin(parseInt(o))).join('.');
const ipToBinaryArr = (ip) => ip.split('.').map(o => toBin(parseInt(o)));

const calcNetwork = (ip, mask) => {
  const ipP = ip.split('.').map(Number);
  const maskP = mask.split('.').map(Number);
  return ipP.map((o, i) => o & maskP[i]).join('.');
};
const calcBroadcast = (ip, mask) => {
  const ipP = ip.split('.').map(Number);
  const maskP = mask.split('.').map(Number);
  return ipP.map((o, i) => (o & maskP[i]) | (~maskP[i] & 255)).join('.');
};
const cidrFromMask = (mask) =>
  mask.split('.').map(Number).map(toBin).join('').split('').filter(b => b === '1').length;
const hostsInNetwork = (mask) => {
  const cidr = cidrFromMask(mask);
  return Math.pow(2, 32 - cidr) - 2;
};
const sameNetwork = (ip1, ip2, mask) => calcNetwork(ip1, mask) === calcNetwork(ip2, mask);

const isPrivate = (ip) => {
  const [a, b] = ip.split('.').map(Number);
  if (a === 10) return true;
  if (a === 172 && b >= 16 && b <= 31) return true;
  if (a === 192 && b === 168) return true;
  return false;
};
const ipClass = (ip) => {
  const a = parseInt(ip.split('.')[0]);
  if (a >= 1 && a <= 126) return 'A';
  if (a >= 128 && a <= 191) return 'B';
  if (a >= 192 && a <= 223) return 'C';
  if (a >= 224 && a <= 239) return 'D';
  return 'E';
};
const validIP = (ip) => /^(\d{1,3}\.){3}\d{1,3}$/.test(ip) &&
  ip.split('.').every(o => +o >= 0 && +o <= 255);

const randomIP = (constraint = 'any') => {
  let a, b, c, d;
  if (constraint === 'private-c') return `192.168.${rnd(0, 255)}.${rnd(1, 254)}`;
  if (constraint === 'private-a') return `10.${rnd(0, 255)}.${rnd(0, 255)}.${rnd(1, 254)}`;
  if (constraint === 'private-b') return `172.${rnd(16, 31)}.${rnd(0, 255)}.${rnd(1, 254)}`;
  if (constraint === 'public') {
    while (true) {
      a = rnd(1, 223);
      if (a === 10 || a === 127) continue;
      b = rnd(0, 255);
      if (a === 172 && b >= 16 && b <= 31) continue;
      if (a === 192 && b === 168) continue;
      return `${a}.${b}.${rnd(0, 255)}.${rnd(1, 254)}`;
    }
  }
  if (constraint === 'classA') return `${rnd(1, 126)}.${rnd(0, 255)}.${rnd(0, 255)}.${rnd(1, 254)}`;
  if (constraint === 'classB') return `${rnd(128, 191)}.${rnd(0, 255)}.${rnd(0, 255)}.${rnd(1, 254)}`;
  if (constraint === 'classC') return `${rnd(192, 223)}.${rnd(0, 255)}.${rnd(0, 255)}.${rnd(1, 254)}`;
  return `${rnd(1, 223)}.${rnd(0, 255)}.${rnd(0, 255)}.${rnd(1, 254)}`;
};
const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

// Bloom levels: 1=זיכרון, 2=הבנה, 3=יישום, 4=ניתוח, 5=הערכה, 6=יצירה

const QGEN = {

    1: () => { // Knowledge

        },

            'לכן כל אוקטטה נעה בטווח **0-255** (סה"כ 256 ערכים אפשריים: 2^8).',
            'טעות נפוצה: 256 לא תקין כי הספירה מתחילה מ-0, אז 0-255 = 256 ערכים.'
          ]
        },
        {
          q: 'מהו הפרוטוקול שמקצה כתובות IP אוטומטית?',
          a: 'DHCP', d: ['DNS', 'HTTP', 'FTP'],
          explain: [
            '**DHCP** = Dynamic Host Configuration Protocol — פרוטוקול שמקצה אוטומטית כתובות IP.',
            'הנתב הביתי מריץ שרת DHCP — בכל פעם שמכשיר חדש מתחבר, הוא מקבל ממנו כתובת.',
            'הבדלים: DNS מתרגם שמות לכתובות, HTTP לגלישה, FTP להעברת קבצים.'
          ]
        },
        {
          q: 'מדוע כתובת ה-IP נקראת לוגית ולא פיזית?',
          a: 'כי ניתן לשנות אותה', d: ['כי היא בבינארי', 'כי היא קצרה', 'כי היא חינמית'],
          explain: [
            'כתובת IP היא **לוגית** — ניתן להקצות ולשנות אותה בהגדרות תוכנה.',
            'לעומת זאת, כתובת **MAC** היא פיזית — צרובה לכרטיס הרשת ולא משתנה.',
            'אנלוגיה: IP זה כמו "השם שאתה רושם על תיבת הדואר" (אפשר להחליף), MAC זה כמו "המספר הסידורי של תיבת הדואר" (קבוע).'
          ]
        },
      ];
      return pick(opts);
    },
    2: () => {
      const ip = randomIP();
      const oct = rnd(0, 3);
      const parts = ip.split('.');
      const val = parseInt(parts[oct]);
      return {
        q: `בכתובת ${ip}, מה הערך של האוקטטה ה-${oct + 1}?`,
        a: `${val}`,
        d: [`${(val + 1) % 256}`, `${(val + 50) % 256}`, `${(val - 30 + 256) % 256}`],
        explain: [
          `כתובת IP מחולקת ל-4 אוקטטות המופרדות בנקודות. סופרים משמאל לימין (החל מ-1).`,
          `בכתובת **${ip}**, האוקטטות הן:`,
          `אוקטטה 1: \`${parts[0]}\` · אוקטטה 2: \`${parts[1]}\` · אוקטטה 3: \`${parts[2]}\` · אוקטטה 4: \`${parts[3]}\``,
          `לכן האוקטטה ה-${oct + 1} היא **${val}**.`
        ]
      };
    },
    3: () => {
      const num = rnd(0, 255);
      const bin = toBin(num);
      const breakdown = [];
      let remaining = num;
      [128, 64, 32, 16, 8, 4, 2, 1].forEach(v => {
        if (remaining >= v) { breakdown.push(v); remaining -= v; }
      });
      return {
        q: `מהו הייצוג הבינארי של המספר ${num}?`,
        a: bin,
        d: [toBin((num + 1) % 256), toBin((num + 7) % 256), toBin((num ^ 0xFF))],
        explain: [
          `כל ביט באוקטטה מייצג חזקה של 2: \`128 64 32 16 8 4 2 1\`.`,
          `מתחילים מהביט הגדול ביותר (128) ושואלים בכל שלב: "האם הערך הזה נכנס במה שנשאר לי?".`,
          breakdown.length > 0
            ? `**${num}** = ${breakdown.join(' + ')} = ${breakdown.reduce((a, b) => a + b, 0)}`

          `מציבים **1** בכל מיקום שהשתמשנו, ו-**0** בשאר.`,
          `התוצאה: \`${bin}\``
        ]
      };
    },
    4: () => {
      const bin = Array(8).fill(0).map(() => rnd(0, 1)).join('');
      const dec = parseInt(bin, 2);
      const weights = [128, 64, 32, 16, 8, 4, 2, 1];
      const summed = bin.split('').map((b, i) => b === '1' ? weights[i] : 0).filter(v => v > 0);
      return {
        q: `מהו הערך העשרוני של המספר הבינארי ${bin}?`,
        a: `${dec}`,
        d: [`${(dec + 1) % 256}`, `${(dec + 16) % 256}`, `${(dec ^ 0x0F)}`],
        explain: [
          `כל ביט משמאל לימין מייצג: \`128 64 32 16 8 4 2 1\`.`,
          `הביטים: \`${bin}\``,
          summed.length > 0
            ? `סוכמים את הערכים של הביטים שהם 1: **${summed.join(' + ')} = ${dec}**`
            : `כל הביטים הם 0, לכן התוצאה היא **0**.`,
          `התשובה: **${dec}**`
        ]
      };
    }
  },
  mask: {
    1: () => {
      const opts = [
        {
          q: 'מסכת ברירת המחדל של Class C היא:',

          q: 'מסכת ברירת המחדל של Class A היא:',
          a: '255.0.0.0', d: ['255.255.0.0', '255.255.255.0', '0.0.0.255'],

            'ב-Class A **רק האוקטטה הראשונה היא רשת**, 3 הנותרות הן מחשבים.',

          a: 'שייך למזהה הרשת', d: ['שייך למזהה המחשב', 'אינו בשימוש', 'שייך לכתובת broadcast'],

            'במסכה, **ביט 1 = הביט המקביל בכתובת ה-IP שייך לרשת**.',
            'ביט 0 = הביט המקביל שייך למחשב (Host).',
            'אנלוגיה: ה-1 "מסמן" איפה שם הרחוב (הרשת), וה-0 איפה מספר הבית (המחשב).'
          ]
        },
      ];
      return pick(opts);
    },
    2: () => {
      const mask = '255.255.255.0';
      const cidr = cidrFromMask(mask);
      const ones = mask.split('.').map(o => parseInt(o) === 255 ? 8 : 0);
      return {
        q: `מסכה ${mask} שווה לאיזה ייצוג CIDR?`,
        a: `/${cidr}`,
        d: [`/${cidr + 1}`, `/${cidr - 1}`, `/${32 - cidr}`],
        explain: [

          `255 = \`11111111\` = **8 ביטים של 1**. 0 = \`00000000\` = **0 ביטים**.`,
          `במסכה \`${mask}\`: ${ones.map((o, i) => `אוקטטה ${i + 1}=${o}`).join(' + ')} = **${cidr}** ביטים.`,
          `לכן ה-CIDR הוא **/${cidr}**.`

            : `מסכה /16: 2 ראשונות נשמרות (**${parts[0]}.${parts[1]}**), 2 אחרונות הופכות ל-**255.255**.`,
          `התשובה: **${bc}**.`
        ]
      };
    }
  }
};

const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const changeOct = (ip, idx, val) => {
  const p = ip.split('.');
  p[idx] = val;
  return p.join('.');
};
const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

const generateQuestion = (topic, level) => {
  const gen = QGEN[topic];
  let chosenLevel = level;
  if (!gen[chosenLevel]) {
    const avail = Object.keys(gen).map(Number).sort((a, b) => Math.abs(a - level) - Math.abs(b - level));
    chosenLevel = avail[0];
  }
  const q = gen[chosenLevel]();
  return {
    ...q,
    level: chosenLevel,
    topic,
    options: shuffle([q.a, ...q.d])
  };
};

      'דוגמה פרטית נוספת: `192.168.1.52` היא פרטית ונפוצה ברשתות ביתיות.',
      'כדי שמחשב פרטי יגלוש לאינטרנט, הנתב משתמש בדרך כלל ב-NAT ומוציא את התעבורה החוצה דרך כתובת ציבורית אחת.'
    ],
    visual: 'private-ranges'
  };
  if (LESSONS?.classes?.sections) {
    const old = LESSONS.classes.sections.filter(s =>
      !String(s.title || '').includes('כתובות ציבוריות') &&
      !String(s.title || '').includes('כתובות פרטיות')
    );
    LESSONS.classes.intro = 'נתחיל בכתובות ציבוריות: כתובות שנראות באינטרנט ומשמשות שרתי אינטרנט, DNS ושירותים שצריכים להיות נגישים מבחוץ. אחר כך נלמד כתובות פרטיות ו-Classes.';
    LESSONS.classes.sections = [publicAddressesSection, privateAddressesSection, ...old];
  }
} catch (e) {
  try { console.error('Failed to reorder classes lesson:', e); } catch {}
}

  useEffect(() => {
    if (!userId) return;
    safeGet(`user:${userId}`, {
      progress: {},
      bloomLevels: { ipv4: 2, mask: 2, binary: 2, classes: 2, broadcast: 2 },
      streaks: {},
      attempts: 0,
      correct: 0,
      highScore: 0,
      bagrutHistory: [],
      activityLog: []
    }).then(setData);
  }, [userId]);
  const update = useCallback((updater) => {
    setData(prev => {
      const next = updater(prev);
      safeSet(`user:${userId}`, next);
      return next;
    });
  }, [userId]);
  return [data, update];
};

const FormattedLine = ({ text }) => {
  // Bold **text**, code `text`; numeric/network expressions stay left-to-right inside Hebrew text.
  const looksLtr = (value) => /(?:\d+\.\d+\.\d+\.\d+|\d+\.\d+-\d+\.x\.x|\d+\.x\.x\.x|\d+\.\d+\.\d+\.\d+\s*[—-]\s*\d+\.\d+\.\d+\.\d+|\/\d+|[01]{4,}|(?:\d+\s*[+×xX]\s*)+\d+|[A-Za-z]+\s+[A-Za-z]+)/.test(value || '');
  const renderSpan = (value, key, extraClass = '') => (
    <span key={key} className={`${looksLtr(value) ? 'ltr-run' : ''} ${extraClass}`.trim()} dir={looksLtr(value) ? 'ltr' : 'auto'}>{value}</span>
  );
  const parts = [];
  let remaining = text || '';
  let i = 0;
  while (remaining.length > 0) {
    const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
    const codeMatch = remaining.match(/`(.+?)`/);
    let nextMatch = null;
    let type = null;
    if (boldMatch && (!codeMatch || boldMatch.index < codeMatch.index)) {
      nextMatch = boldMatch; type = 'bold';
    } else if (codeMatch) {
      nextMatch = codeMatch; type = 'code';
    }
    if (!nextMatch) {
      parts.push(renderSpan(remaining, i++));
      break;
    }
    if (nextMatch.index > 0) {
      parts.push(renderSpan(remaining.slice(0, nextMatch.index), i++));
    }
    if (type === 'bold') {
      const isLtr = looksLtr(nextMatch[1]);
      parts.push(<strong key={i++} className={`text-white font-bold ${isLtr ? 'ltr-run' : ''}`} dir={isLtr ? 'ltr' : 'auto'}>{nextMatch[1]}</strong>);
    } else {
      parts.push(<code key={i++} className="font-mono bg-slate-800 text-cyan-300 px-2 py-0.5 rounded text-base ltr-run" dir="ltr">{nextMatch[1]}</code>);
    }
    remaining = remaining.slice(nextMatch.index + nextMatch[0].length);
  }
  return <p dir="rtl">{parts}</p>;
};

// Interactive binary converter
const InteractiveBinary = () => {
  const [bits, setBits] = useState([1, 1, 0, 0, 0, 0, 0, 0]);
  const dec = bits.reduce((s, b, i) => s + (b ? Math.pow(2, 7 - i) : 0), 0);
  const weights = [128, 64, 32, 16, 8, 4, 2, 1];
  return (
    <div className="mt-6 p-5 rounded-xl bg-slate-950 border border-emerald-500/30 font-mono" dir="ltr">
      <div className="text-center text-emerald-300 text-sm mb-3">// Click bits to toggle</div>
      <div className="grid grid-cols-8 gap-2 mb-3">
        {bits.map((b, i) => (
          <button key={i}
            onClick={() => setBits(p => p.map((x, j) => i === j ? (x ? 0 : 1) : x))}
            className={`p-3 rounded-lg transition-all ${b ? 'bg-emerald-500 text-slate-950 font-bold scale-105' : 'bg-slate-800 text-slate-500'}`}>
            <div className="text-xl">{b}</div>
            <div className="text-[10px] opacity-70">{weights[i]}</div>
          </button>
        ))}
      </div>
      <div className="text-center">
        <span className="text-slate-400">Decimal: </span>
        <span className="text-2xl font-black text-emerald-300">{dec}</span>
      </div>
    </div>
  );
};

// ============== ADAPTIVE PRACTICE ==============
const PracticeView = ({ topic, userData, updateUser, setView }) => {
  const PRACTICE_LIMIT = 20;
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [answers, setAnswers] = useState({});
  const [showResults, setShowResults] = useState(false);
  const [showRevision, setShowRevision] = useState(null);

  const lesson = LESSONS[topic];
  const Icon = lesson.icon;

  const buildPractice = useCallback(() => {
    const qs = [];
    for (let i = 0; i < PRACTICE_LIMIT; i += 1) {
      const baseLevel = userData?.bloomLevels?.[topic] || 2;
      const level = Math.max(1, Math.min(4, ((baseLevel + i - 1) % 4) + 1));
      qs.push(generateQuestion(topic, level));
    }
    setQuestions(qs.slice(0, PRACTICE_LIMIT));
    setCurrent(0);
    setSelected(null);
    setAnswered(false);
    setAnswers({});
    setShowResults(false);
    setShowRevision(null);
  }, [topic, userData]);

  useEffect(() => { if (userData && questions.length === 0) buildPractice(); }, [userData, questions.length, buildPractice]);

  const finishPractice = useCallback((finalAnswers = answers) => {
    const total = Math.min(PRACTICE_LIMIT, questions.length);
    const correct = questions.slice(0, total).reduce((s, q, i) => s + (finalAnswers[i] === q.a ? 1 : 0), 0);
    const grade = total ? Math.round((correct / total) * 100) : 0;
    updateUser(prev => ({
      ...prev,
      attempts: (prev.attempts || 0) + total,
      correct: (prev.correct || 0) + correct,
      progress: {
        ...prev.progress,
        [topic]: { ...(prev.progress?.[topic] || {}), practiced: grade >= 70 }
      },
      activityLog: [...(prev.activityLog || []), { type: 'practice_done', topic, grade, total, time: Date.now() }]
    }));
    setShowResults(true);
  }, [answers, questions, topic, updateUser]);

  if (!lesson) return null;
  if (!questions.length) return <div className="min-h-screen bg-slate-950 text-white flex items-center justify-center">טוען...</div>;

  const total = Math.min(PRACTICE_LIMIT, questions.length);
  const q = questions[current];
  const correctCount = questions.slice(0, total).reduce((s, item, i) => s + (answers[i] === item.a ? 1 : 0), 0);
  const grade = total ? Math.round((correctCount / total) * 100) : 0;

  if (showResults) {
    const passed = grade >= 70;
    return (
      <div className="min-h-screen bg-slate-950 text-white p-6" dir="rtl">
        <div className="max-w-3xl mx-auto">
          <div className={`text-center p-8 rounded-3xl ${passed ? 'bg-emerald-900/30 border-emerald-500/40' : 'bg-amber-900/20 border-amber-500/40'} border mb-6`}>
            <Award className={`w-16 h-16 mx-auto mb-4 ${passed ? 'text-emerald-300' : 'text-amber-300'}`} />
            <div className="text-2xl font-bold mb-2">סיימת 20 שאלות</div>
            <div className={`text-7xl font-black mb-2 ${passed ? 'text-emerald-300' : 'text-amber-300'}`}>{grade}</div>
            <div className="text-lg text-slate-300">{correctCount} / {total} תשובות נכונות</div>
            <div className={`mt-4 text-xl font-black ${passed ? 'text-emerald-300' : 'text-amber-300'}`}>
              {passed ? 'ניתן להמשיך לנושא הבא' : 'כדאי לחזק את הנושא לפני שממשיכים'}
            </div>
            {!passed && <p className="mt-3 text-slate-300">הציון נמוך מ-70. מומלץ לבחור לימוד חוזר או לבצע מבחן חוזר.</p>}
          </div>

          <h2 className="font-bold text-xl mb-4">סקירת תשובות</h2>
          <div className="space-y-3 mb-6 safe-scroll">
            {questions.slice(0, total).map((item, i) => {
              const userAns = answers[i];
              const isOk = userAns === item.a;
              return (
                <button key={i} onClick={() => setShowRevision(showRevision === i ? null : i)}
                  className="w-full text-right p-4 rounded-xl bg-slate-900 border border-slate-800 hover:border-slate-700 transition-colors">
                  <div className="flex items-center gap-2 mb-1">
                    {isOk ? <Check className="w-5 h-5 text-emerald-400" /> : <X className="w-5 h-5 text-pink-400" />}
                    <div className="text-xs text-slate-400">שאלה {i + 1}</div>
                  </div>
                  <div className="text-sm" dir="auto">{item.q}</div>
                  {showRevision === i && (
                    <div className="mt-3 pt-3 border-t border-slate-800 text-sm space-y-2">
                      <div>תשובה שלך: <span className={`font-mono ${isOk ? 'text-emerald-300' : 'text-pink-300'}`} dir="auto">{userAns || 'לא ענית'}</span></div>
                      {!isOk && <div>נכון: <span className="font-mono text-emerald-300" dir="auto">{item.a}</span></div>}
                      {item.explain?.length > 0 && (
                        <div className="mt-3 pt-3 border-t border-slate-800 text-xs text-slate-300 space-y-1">
                          {item.explain.map((line, li) => <div key={li}><FormattedLine text={line} /></div>)}
                        </div>
                      )}
                    </div>
                  )}
                </button>
              );
            })}
          </div>

          <div className="flex flex-col sm:flex-row gap-3">
            {!passed && <button onClick={() => setView({ name: 'lesson', topic })} className="flex-1 px-5 py-3 rounded-xl bg-cyan-700 hover:bg-cyan-600 font-bold">לימוד חוזר</button>}
            {!passed && <button onClick={buildPractice} className="flex-1 px-5 py-3 rounded-xl bg-amber-600 hover:bg-amber-500 font-bold">מבחן חוזר</button>}
            {passed && <button onClick={() => setView({ name: 'dashboard' })} className="flex-1 px-5 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-500 font-bold">המשך לנושא הבא</button>}
            <button onClick={() => setView({ name: 'dashboard' })} className="px-5 py-3 rounded-xl bg-slate-800 hover:bg-slate-700">לוח הבית</button>
          </div>
        </div>
      </div>
    );
  }

  const submit = () => {
    if (selected === null) return;
    const nextAnswers = { ...answers, [current]: selected };
    setAnswers(nextAnswers);
    setAnswered(true);
  };

  const goNext = () => {
    if (current >= total - 1) {
      finishPractice(answers);
      return;
    }
    setCurrent(current + 1);
    setSelected(null);
    setAnswered(false);
  };

  const isCorrect = answered && selected === q.a;

  return (
    <div className="min-h-screen bg-slate-950 text-white" dir="rtl">
      <div className="sticky top-0 z-20 bg-slate-950/90 backdrop-blur-xl border-b border-slate-800">
        <div className="max-w-3xl mx-auto p-4 flex items-center justify-between">
          <button onClick={() => setView({ name: 'dashboard' })} className="flex items-center gap-2 text-slate-400 hover:text-white">
            <ChevronRight className="w-5 h-5" /> חזרה
          </button>
          <div className="flex items-center gap-2">
            <Icon className={`w-5 h-5 text-${lesson.color}-400`} />
            <span className="font-bold">תרגול: {lesson.title}</span>
          </div>
          <div className="text-sm font-mono text-cyan-300">{current + 1}/{total}</div>
        </div>
        <div className="h-1 bg-slate-800">
          <div className="h-full bg-gradient-to-l from-cyan-500 to-blue-500" style={{ width: `${((current + 1) / total) * 100}%` }}></div>
        </div>
      </div>

      <div className="max-w-3xl mx-auto p-6">
        <div className="mb-6 p-4 rounded-2xl bg-slate-900 border border-slate-800">
          <div className="flex items-center justify-between mb-2">
            <span className="text-sm text-slate-400">שאלה {current + 1} מתוך {total}</span>
            <span className={`px-3 py-1 rounded-full text-sm font-bold bg-gradient-to-l ${BLOOM_COLORS[q.level]}`}>
              {q.level}. {BLOOM_NAMES[q.level]}
            </span>
          </div>
          <div className="flex gap-1">
            {Array.from({ length: total }).map((_, i) => (
              <div key={i} className={`flex-1 h-1.5 rounded ${i <= current ? 'bg-cyan-500' : 'bg-slate-800'}`}></div>
            ))}
          </div>
        </div>

        <div className="bg-gradient-to-br from-slate-900 to-slate-800 border border-slate-700 rounded-2xl p-6 mb-6">
          <div className="text-xl font-bold leading-relaxed mb-2" dir="auto">{q.q}</div>
        </div>

        <div className="space-y-3 mb-6 safe-scroll">
          {q.options.map((opt, i) => {
            const isSel = selected === opt;
            const isAns = answered && opt === q.a;
            const isWrong = answered && isSel && opt !== q.a;
            return (
              <button key={i}
                onClick={() => !answered && setSelected(opt)}
                disabled={answered}
                className={`w-full p-4 rounded-xl text-right font-mono transition-all border-2 ${isAns ? 'bg-emerald-900/40 border-emerald-500' :
                  isWrong ? 'bg-pink-900/40 border-pink-500' :
                    isSel ? 'bg-cyan-900/40 border-cyan-500' :
                      'bg-slate-900 border-slate-700 hover:border-slate-600'}`}
                dir="auto">
                <div className="flex items-center justify-between">
                  <span className="text-base">{opt}</span>
                  {isAns && <Check className="w-5 h-5 text-emerald-400" />}
                  {isWrong && <X className="w-5 h-5 text-pink-400" />}
                </div>
              </button>
            );
          })}
        </div>

        {answered && (
          <div className={`p-5 rounded-xl mb-4 ${isCorrect ? 'bg-emerald-900/20 border border-emerald-500/50' : 'bg-pink-900/20 border border-pink-500/50'}`}>
            <div className="flex items-center gap-2 font-bold mb-3">
              {isCorrect ? <><Check className="w-6 h-6 text-emerald-400" /> <span className="text-emerald-300 text-lg">נכון!</span></> : <><X className="w-6 h-6 text-pink-400" /> <span className="text-pink-300 text-lg">לא נכון</span></>}
            </div>
            <div className="text-sm text-slate-300 mb-3 pb-3 border-b border-slate-700/50">
              {isCorrect ? 'בחרת ב-' : 'התשובה הנכונה היא: '}
              <span className="font-mono text-white font-bold mx-1" dir="auto">{q.a}</span>
              {!isCorrect && selected && <span className="block text-xs mt-1 text-slate-400">בחרת: <span className="font-mono text-pink-300" dir="auto">{selected}</span></span>}
            </div>
            {q.explain?.length > 0 && (
              <div className="space-y-2">
                <div className="flex items-center gap-2 text-sm font-bold text-cyan-300"><BookOpen className="w-4 h-4" /> איך פותרים?</div>
                <div className="space-y-1.5 pr-1">
                  {q.explain.map((line, i) => <div key={i} className="text-sm text-slate-200 leading-relaxed"><FormattedLine text={line} /></div>)}
                </div>
              </div>
            )}
          </div>
        )}

        <div className="flex gap-3">
          {!answered ? (
            <button onClick={submit} disabled={selected === null}
              className="flex-1 p-4 rounded-xl bg-gradient-to-l from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 disabled:opacity-30 font-bold transition-all">
              שלח תשובה
            </button>
          ) : (
            <button onClick={goNext}
              className="flex-1 p-4 rounded-xl bg-gradient-to-l from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 font-bold transition-all flex items-center justify-center gap-2">
              {current >= total - 1 ? 'סיים וקבל ציון' : 'שאלה הבאה'} <ArrowRight className="w-5 h-5" />
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

// ============== SPACE INVADERS GAME ==============
const GameView = ({ userData, updateUser, setView }) => {
  const [gameState, setGameState] = useState('menu'); // menu, playing, over
  const [criterion, setCriterion] = useState(null);
  const [invaders, setInvaders] = useState([]);
  const [projectiles, setProjectiles] = useState([]);
  const [playerX, setPlayerX] = useState(50);
  const [score, setScore] = useState(0);
  const [lives, setLives] = useState(3);
  const [wave, setWave] = useState(1);
  const containerRef = useRef(null);
  const keysRef = useRef({});
  const lastShotRef = useRef(0);
  const spawningRef = useRef(false);
  const [hitMessages, setHitMessages] = useState([]);

  const CRITERIA = [
    { id: 'private', label: 'ירה בכתובות פרטיות', check: ip => isPrivate(ip) },
    { id: 'public', label: 'ירה בכתובות ציבוריות', check: ip => !isPrivate(ip) },
    { id: 'classA', label: 'ירה בכתובות Class A', check: ip => ipClass(ip) === 'A' },
    { id: 'classB', label: 'ירה בכתובות Class B', check: ip => ipClass(ip) === 'B' },
    { id: 'classC', label: 'ירה בכתובות Class C', check: ip => ipClass(ip) === 'C' },
    { id: 'broadcast24', label: 'ירה בכתובות Broadcast של רשת /24', check: ip => ip.split('.')[3] === '255' },
    { id: 'network24', label: 'ירה בכתובות רשת של /24', check: ip => ip.split('.')[3] === '0' },
  ];

  const spawnWave = useCallback(() => {
    spawningRef.current = false;
    const crit = CRITERIA[Math.floor(Math.random() * CRITERIA.length)];
    setCriterion(crit);
    const newInvaders = [];
    // Fewer invaders: starts at 3, slowly grows. Cap at 5 per row for readability.
    const count = Math.min(6, 3 + Math.floor((wave - 1) / 2));
    for (let i = 0; i < count; i++) {
      let ip;
      // Mix: ~40% chance to match criterion, rest random
      if (i === 0 || Math.random() < 0.4) {
        if (crit.id === 'private') ip = randomIP(pick(['private-a', 'private-b', 'private-c']));
        else if (crit.id === 'public') ip = randomIP('public');
        else if (crit.id === 'classA') ip = randomIP('classA');
        else if (crit.id === 'classB') ip = randomIP('classB');
        else if (crit.id === 'classC') ip = randomIP('classC');
        else if (crit.id === 'broadcast24') {
          const r = randomIP();
          ip = changeOct(r, 3, 255);
        }
        else if (crit.id === 'network24') {
          const r = randomIP();
          ip = changeOct(r, 3, 0);
        }
      } else {
        ip = randomIP();
      }
      // Spread invaders evenly across the screen with generous spacing
      const perRow = Math.min(count, 5);
      const row = Math.floor(i / perRow);
      const col = i % perRow;
      newInvaders.push({
        id: Math.random(),
        ip,
        x: 15 + col * (70 / Math.max(perRow - 1, 1)),
        y: -10 - row * 18,
        match: crit.check(ip)
      });
    }
    setInvaders(newInvaders);
  }, [wave]);

  const startGame = () => {
    setGameState('playing');
    setScore(0);
    setLives(3);
    setWave(1);
    setProjectiles([]);
    setHitMessages([]);
    setPlayerX(50);
    spawnWave();
  };

  const shoot = () => {
    const now = Date.now();
    if (now - lastShotRef.current < 250) return;
    lastShotRef.current = now;
    setProjectiles(p => [...p, { id: Math.random(), x: playerX, y: 90 }]);
  };

  // Game loop
  useEffect(() => {
    if (gameState !== 'playing') return;
    const interval = setInterval(() => {
      // Move invaders down
      setInvaders(prev => {
        const moved = prev.map(inv => ({ ...inv, y: inv.y + 0.018 + wave * 0.002 }));
        // Check ones reached bottom
        const reachedBottom = moved.filter(inv => inv.y > 88);
        if (reachedBottom.length > 0) {
          const wrongLet = reachedBottom.filter(inv => inv.match).length;
          if (wrongLet > 0) setLives(l => l - wrongLet);
        }
        return moved.filter(inv => inv.y <= 88);
      });

      // Move projectiles up
      setProjectiles(prev => prev.map(p => ({ ...p, y: p.y - 4 })).filter(p => p.y > -5));

      // Handle keyboard movement
      if (keysRef.current['ArrowLeft']) setPlayerX(x => Math.max(2, x - 1.5));
      if (keysRef.current['ArrowRight']) setPlayerX(x => Math.min(98, x + 1.5));
      if (keysRef.current[' ']) shoot();
    }, 30);
    return () => clearInterval(interval);
    // eslint-disable-next-line
  }, [gameState, playerX, wave]);

  // Collision detection
  useEffect(() => {
    if (gameState !== 'playing' || projectiles.length === 0) return;
    setProjectiles(prevProj => {
      const remaining = [];
      const hitInvaderIds = new Set();
      for (const proj of prevProj) {
        let hit = false;
        for (const inv of invaders) {
          if (hitInvaderIds.has(inv.id)) continue;
          if (Math.abs(proj.x - inv.x) < 9 && Math.abs(proj.y - inv.y) < 7) {
            hitInvaderIds.add(inv.id);
            hit = true;
            // Score adjustment
            setScore(s => s + (inv.match ? 100 : -50));
            const msg = { id: Math.random(), x: inv.x, y: inv.y, ok: inv.match, text: inv.match ? '🎯 בול פגיעה!' : '❌ שגיאה' };
            setHitMessages(m => [...m.slice(-4), msg]);
            setTimeout(() => setHitMessages(m => m.filter(item => item.id !== msg.id)), 900);
            if (!inv.match) setLives(l => l - 0.5); // wrong target penalty
            break;
          }
        }
        if (!hit) remaining.push(proj);
      }
      if (hitInvaderIds.size > 0) {
        setInvaders(prev => prev.filter(inv => !hitInvaderIds.has(inv.id)));
        return remaining;
      }
      return prevProj;
    });
  }, [projectiles, invaders, gameState]);

  // Check wave completion
  useEffect(() => {
    if (gameState === 'playing' && invaders.length === 0 && !spawningRef.current) {
      spawningRef.current = true;
      setTimeout(() => {
        setWave(w => w + 1);
        spawnWave();
      }, 800);
    }
  }, [invaders.length, gameState, spawnWave]);

  // Game over
  useEffect(() => {
    if (lives <= 0 && gameState === 'playing') {
      setGameState('over');
      updateUser(prev => ({
        ...prev,
        highScore: Math.max(prev.highScore || 0, score),
        activityLog: [...(prev.activityLog || []), { type: 'game', score, wave, time: Date.now() }]
      }));
    }
  }, [lives, gameState, score, wave, updateUser]);

  // Keyboard
  useEffect(() => {
    const down = e => { keysRef.current[e.key] = true; if (e.key === ' ') e.preventDefault(); };
    const up = e => { keysRef.current[e.key] = false; };
    window.addEventListener('keydown', down);
    window.addEventListener('keyup', up);
    return () => { window.removeEventListener('keydown', down); window.removeEventListener('keyup', up); };
  }, []);

  // Touch
  const handleTouch = e => {
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    const x = ((e.touches[0].clientX - rect.left) / rect.width) * 100;
    setPlayerX(Math.max(2, Math.min(98, x)));
  };

  if (gameState === 'menu') {
    return (
      <div className="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 text-white p-6 flex items-center justify-center relative overflow-hidden" dir="rtl">
        <div className="absolute inset-0 opacity-20">
          {Array.from({ length: 50 }).map((_, i) => (
            <div key={i} className="absolute w-1 h-1 bg-white rounded-full" style={{
              left: `${Math.random() * 100}%`,
              top: `${Math.random() * 100}%`,
              animation: `twinkle ${1 + Math.random() * 3}s infinite`
            }}></div>
          ))}
        </div>
        <div className="relative z-10 text-center max-w-2xl">
          <Rocket className="w-24 h-24 mx-auto mb-6 text-pink-400" />
          <h1 className="text-5xl md:text-6xl font-black mb-4 bg-gradient-to-l from-pink-300 via-fuchsia-300 to-violet-300 bg-clip-text text-transparent">פולשי החלל</h1>
          <p className="text-xl text-slate-300 mb-2">כל "בית" 🏠 שמרחף הוא כתובת IP. עליך להגן על הרשת!</p>
          <p className="text-sm text-slate-400 mb-8">בכל גל יוצג קריטריון. ירה <strong className="text-amber-300">רק</strong> בכתובות שמתאימות לקריטריון.</p>
          <div className="bg-slate-900/70 backdrop-blur border border-amber-500/30 rounded-2xl p-5 mb-6 text-right">
            <h3 className="font-bold mb-3 text-amber-300">הוראות:</h3>
            <ul className="space-y-1 text-sm text-slate-300">
              <li>← → / מגע: זוז שמאלה וימינה</li>
              <li>רווח / לחיצה: ירה</li>
              <li>פגיעה נכונה: +100 ❘ פגיעה שגויה: -50 וחצי חיים</li>
              <li>פספוס יעד נכון: -1 חיים</li>
              <li className="text-amber-300 pt-2">💡 טיפ: כל הכתובות באותו צבע. תצטרך לחשוב על כל אחת!</li>
            </ul>
          </div>
          <div className="flex gap-3 justify-center">
            <button onClick={startGame}
              className="px-8 py-4 rounded-2xl bg-gradient-to-l from-pink-600 to-violet-600 hover:from-pink-500 hover:to-violet-500 text-white font-black text-lg shadow-2xl shadow-pink-500/40 hover:scale-105 transition-all">
              <Play className="w-6 h-6 inline ml-2" /> התחל
            </button>
            <button onClick={() => setView({ name: 'dashboard' })}
              className="px-6 py-4 rounded-2xl bg-slate-800 hover:bg-slate-700 text-white font-semibold transition-all">
              חזרה
            </button>
          </div>
          {userData?.highScore > 0 && <div className="mt-6 text-amber-300 flex items-center justify-center gap-2"><Trophy className="w-5 h-5" /> שיא: {userData.highScore}</div>}
        </div>
        <style>{`@keyframes twinkle { 0%,100% { opacity: 0.3 } 50% { opacity: 1 } }`}</style>
      </div>
    );
  }

  if (gameState === 'over') {
    return (
      <div className="min-h-screen bg-gradient-to-br from-slate-950 via-pink-950/40 to-slate-950 text-white p-6 flex items-center justify-center" dir="rtl">
        <div className="text-center">
          <h1 className="text-6xl font-black mb-4 text-pink-400">המשחק נגמר</h1>
          <div className="text-2xl mb-2">ציון סופי: <span className="text-amber-300 font-black">{score}</span></div>
          <div className="text-lg text-slate-300 mb-8">הגעת לגל {wave}</div>
          {score > (userData?.highScore || 0) && score === userData?.highScore && (
            <div className="text-xl text-amber-300 mb-4">🏆 שיא חדש!</div>
          )}
          <div className="flex gap-3 justify-center">
            <button onClick={startGame}
              className="px-6 py-3 rounded-xl bg-gradient-to-l from-pink-600 to-violet-600 hover:from-pink-500 hover:to-violet-500 font-bold">
              <RefreshCw className="w-5 h-5 inline ml-2" /> שוב
            </button>
            <button onClick={() => setView({ name: 'dashboard' })} className="px-6 py-3 rounded-xl bg-slate-800 hover:bg-slate-700">
              לוח הבית
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gradient-to-b from-slate-950 via-purple-950/30 to-slate-900 text-white overflow-hidden relative select-none" dir="ltr">
      {/* HUD */}
      <div className="absolute top-0 left-0 right-0 z-30 p-4 flex justify-between items-start pointer-events-none">
        <div className="bg-slate-900/80 backdrop-blur px-4 py-2 rounded-xl border border-pink-500/30">
          <div className="text-xs text-slate-400">SCORE</div>
          <div className="text-2xl font-black text-pink-300">{score}</div>
        </div>
        <div className="bg-slate-900/80 backdrop-blur px-4 py-2 rounded-xl border border-violet-500/30 text-center max-w-xs">
          <div className="text-xs text-violet-300">משימה (גל {wave})</div>
          <div className="text-sm font-bold mt-1" dir="rtl">{criterion?.label}</div>
        </div>
        <div className="bg-slate-900/80 backdrop-blur px-4 py-2 rounded-xl border border-red-500/30">
          <div className="text-xs text-slate-400">LIVES</div>
          <div className="text-2xl font-black text-red-300">{Math.ceil(lives)} ❤</div>
        </div>
      </div>

      {/* Play area */}
      <div ref={containerRef}
        className="relative w-full h-screen cursor-crosshair"
        onTouchMove={handleTouch}
        onClick={shoot}>

        {/* Stars */}
        {Array.from({ length: 80 }).map((_, i) => (
          <div key={i} className="absolute w-0.5 h-0.5 bg-white rounded-full opacity-50" style={{
            left: `${(i * 37) % 100}%`, top: `${(i * 19) % 100}%`
          }}></div>
        ))}

        {/* Invaders — all same "house" amber color, larger font */}
        {invaders.map(inv => (
          <div key={inv.id}
            className="absolute font-mono transform -translate-x-1/2"
            style={{ left: `${inv.x}%`, top: `${inv.y}%` }}>
            <div className="px-4 py-2 rounded-lg border-2 bg-amber-900/70 border-amber-400/70 text-amber-100 text-lg md:text-xl font-bold shadow-lg shadow-amber-500/30 whitespace-nowrap">
              🏠 {inv.ip}
            </div>
          </div>
        ))}

        {/* Projectiles */}
        {projectiles.map(p => (
          <div key={p.id}
            className="absolute w-1 h-4 bg-gradient-to-b from-pink-400 to-transparent transform -translate-x-1/2"
            style={{ left: `${p.x}%`, top: `${p.y}%` }}></div>
        ))}

        {/* Hit feedback */}
        {hitMessages.map(msg => (
          <div key={msg.id}
            className={`absolute transform -translate-x-1/2 -translate-y-1/2 px-4 py-2 rounded-xl text-lg md:text-xl font-black shadow-2xl ${msg.ok ? 'bg-emerald-500 text-white shadow-emerald-500/40' : 'bg-red-500 text-white shadow-red-500/40'}`}
            style={{ left: `${msg.x}%`, top: `${msg.y}%`, zIndex: 25 }}>
            {msg.text}
          </div>
        ))}

        {/* Player */}
        <div className="absolute bottom-8 transform -translate-x-1/2" style={{ left: `${playerX}%` }}>
          <div className="text-3xl">🚀</div>
        </div>

        {/* Touch hint */}
        <div className="absolute bottom-2 left-1/2 -translate-x-1/2 text-xs text-slate-500 pointer-events-none">
          ← ARROWS · SPACE / CLICK ·
        </div>
      </div>
    </div>
  );
};

// ============== BAGRUT SIMULATOR ==============
const BagrutView = ({ userData, updateUser, setView }) => {
  const [state, setState] = useState('intro'); // intro, exam, results
  const [questions, setQuestions] = useState([]);
  const [answers, setAnswers] = useState({});
  const [current, setCurrent] = useState(0);
  const [timeLeft, setTimeLeft] = useState(1800); // 30 minutes for 20 questions
  const [showRevision, setShowRevision] = useState(null);

  const buildExam = () => {
    const topics = ['ipv4', 'mask', 'binary', 'classes', 'broadcast'];
    const qs = [];
    // 20 questions: each topic appears several times, with mixed Bloom levels.
    topics.forEach(t => {
      [1, 2, 3, 4].forEach(level => qs.push(generateQuestion(t, level)));
    });
    setQuestions(shuffle(qs).slice(0, 20));
    setAnswers({});
    setCurrent(0);
    setShowRevision(null);
    setTimeLeft(1800);
    setState('exam');
  };

  useEffect(() => {
    if (state !== 'exam') return;
    if (!questions.length) return;
    if (timeLeft <= 0) { finishExam(); return; }
    const t = setTimeout(() => setTimeLeft(prev => Math.max(0, prev - 1)), 1000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [timeLeft, state, questions.length]);

  const finishExam = () => {
    const examQuestions = questions.slice(0, 20);
    const score = examQuestions.reduce((s, q, i) => s + (answers[i] === q.a ? 1 : 0), 0);
    const grade = examQuestions.length ? Math.round((score / examQuestions.length) * 100) : 0;
    updateUser(prev => ({
      ...prev,
      bagrutHistory: [...(prev.bagrutHistory || []), {
        score, total: examQuestions.length, grade, time: Date.now()
      }],
      activityLog: [...(prev.activityLog || []), { type: 'bagrut', grade, time: Date.now() }]
    }));
    setState('results');
  };

  if (state === 'intro') {
    return (
      <div className="min-h-screen bg-slate-950 text-white p-6 flex items-center justify-center" dir="rtl">
        <div className="max-w-2xl text-center">
          <FileText className="w-20 h-20 mx-auto mb-6 text-amber-400" />
          <h1 className="text-4xl font-black mb-4">סימולטור בגרות</h1>
          <p className="text-lg text-slate-300 mb-6">20 שאלות מעורבות בסגנון בגרות. המבחן מסתיים רק לאחר שאלה 20, ואז מתקבלים תשובות, הסברים וציון. המבחן בודק את כל הנושאים: IP, מיסוך, בינארי, Classes, כתובות פרטיות/ציבוריות ו-Broadcast.</p>
          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 mb-6 text-right">
            <div className="grid grid-cols-2 gap-4 text-sm">
              <div><Clock className="w-4 h-4 inline text-amber-400 ml-1" /> זמן: <strong>30 דקות</strong></div>
              <div><Target className="w-4 h-4 inline text-cyan-400 ml-1" /> שאלות: <strong>20</strong></div>
              <div><Brain className="w-4 h-4 inline text-violet-400 ml-1" /> רמות: <strong>הבנה + יישום</strong></div>
              <div><Award className="w-4 h-4 inline text-emerald-400 ml-1" /> ציון: <strong>0-100</strong></div>
            </div>
          </div>
          <div className="flex gap-3 justify-center">
            <button onClick={buildExam}
              className="px-8 py-4 rounded-2xl bg-gradient-to-l from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 font-black text-lg shadow-2xl shadow-amber-500/30">
              התחל בגרות <Play className="w-5 h-5 inline mr-2" />
            </button>
            <button onClick={() => setView({ name: 'dashboard' })}
              className="px-6 py-4 rounded-2xl bg-slate-800 hover:bg-slate-700 font-semibold">
              חזרה
            </button>
          </div>
          {userData?.bagrutHistory?.length > 0 && (
            <div className="mt-8 p-4 rounded-xl bg-slate-900 border border-slate-800">
              <h3 className="font-bold mb-2">היסטוריה</h3>
              <div className="flex gap-2 justify-center flex-wrap">
                {userData.bagrutHistory.slice(-5).map((h, i) => (
                  <div key={i} className={`px-3 py-1 rounded-full text-sm ${h.grade >= 85 ? 'bg-emerald-900 text-emerald-300' :
                      h.grade >= 70 ? 'bg-cyan-900 text-cyan-300' :
                        h.grade >= 55 ? 'bg-amber-900 text-amber-300' :
                          'bg-pink-900 text-pink-300'}`}>
                    {h.grade}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (state === 'exam') {
    const q = questions[current];
    if (!q) {
      return (
        <div className="min-h-screen bg-slate-950 text-white p-6 flex items-center justify-center" dir="rtl">
          <div className="text-center">
            <div className="text-xl font-bold mb-4">טוען שאלות...</div>
            <button onClick={buildExam} className="px-5 py-3 rounded-xl bg-cyan-600 hover:bg-cyan-500 font-bold">התחל מחדש</button>
          </div>
        </div>
      );
    }
    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    return (
      <div className="min-h-screen bg-slate-950 text-white" dir="rtl">
        <div className="sticky top-0 z-20 bg-slate-950/95 backdrop-blur border-b border-slate-800">
          <div className="max-w-3xl mx-auto p-4 flex items-center justify-between">
            <div className="text-sm font-mono text-amber-300 flex items-center gap-2">
              <Clock className="w-4 h-4" /> {min}:{sec.toString().padStart(2, '0')}
            </div>
            <div className="text-sm">שאלה {Math.min(current + 1, 20)} מתוך 20</div>
            {current === 0 ? (
              <button onClick={() => setState('intro')} className="text-slate-400 hover:text-white text-sm flex items-center gap-2">
                <ChevronRight className="w-4 h-4" /> חזרה
              </button>
            ) : (
              <div className="w-14" aria-hidden="true"></div>
            )}
          </div>
          <div className="h-1 bg-slate-800">
            <div className="h-full bg-gradient-to-l from-amber-500 to-orange-500"
              style={{ width: `${((Math.min(current + 1, 20)) / 20) * 100}%` }}></div>
          </div>
        </div>

        <div className="max-w-3xl mx-auto p-6">
          <div className="text-xs text-slate-500 mb-2">נושא: {LESSONS[q.topic].title} · רמה: {BLOOM_NAMES[q.level]}</div>
          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 mb-6">
            <div className="text-xl font-bold leading-relaxed" dir="auto">{q.q}</div>
          </div>
          <div className="space-y-3 mb-6 safe-scroll">
            {q.options.map((opt, i) => (
              <button key={i}
                onClick={() => setAnswers({ ...answers, [current]: opt })}
                className={`w-full p-4 rounded-xl text-right font-mono border-2 transition-all ${answers[current] === opt ? 'bg-amber-900/40 border-amber-500' : 'bg-slate-900 border-slate-700 hover:border-slate-600'}`}
                dir="auto">
                {opt}
              </button>
            ))}
          </div>
          <div className="flex gap-3">
            <button onClick={() => setCurrent(Math.max(0, current - 1))} disabled={current === 0}
              className="px-5 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed">
              קודם
            </button>
            {current < questions.length - 1 ? (
              <button onClick={() => setCurrent(current + 1)}
                className="flex-1 px-5 py-3 rounded-xl bg-gradient-to-l from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 font-bold">
                הבא
              </button>
            ) : (
              <button onClick={finishExam}
                className="flex-1 px-5 py-3 rounded-xl bg-gradient-to-l from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 font-bold">
                סיים בגרות
              </button>
            )}
          </div>
          <div className="mt-4 grid grid-cols-5 sm:grid-cols-10 gap-1">
            {questions.map((_, i) => (
              <button key={i} onClick={() => setCurrent(i)}
                className={`p-2 rounded text-xs ${i === current ? 'bg-amber-500 text-slate-950 font-bold' :
                    answers[i] ? 'bg-slate-700 text-white' : 'bg-slate-900 text-slate-500 border border-slate-800'}`}>
                {i + 1}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // Results
  const resultQuestions = questions.slice(0, 20);
  const correct = resultQuestions.reduce((s, q, i) => s + (answers[i] === q.a ? 1 : 0), 0);
  const grade = resultQuestions.length ? Math.round((correct / resultQuestions.length) * 100) : 0;
  const verdict = grade >= 85 ? { txt: 'מצוין!', color: 'emerald' } :
    grade >= 70 ? { txt: 'טוב', color: 'cyan' } :
      grade >= 55 ? { txt: 'עובר', color: 'amber' } :
        { txt: 'דורש חזרה', color: 'pink' };

  return (
    <div className="min-h-screen bg-slate-950 text-white p-6" dir="rtl">
      <div className="max-w-3xl mx-auto">
        <div className={`text-center p-8 rounded-3xl bg-gradient-to-br from-${verdict.color}-900/40 to-slate-900 border border-${verdict.color}-500/30 mb-6`}>
          <Award className={`w-20 h-20 mx-auto mb-4 text-${verdict.color}-400`} />
          <div className="text-2xl mb-2">הציון שלך:</div>
          <div className={`text-7xl font-black text-${verdict.color}-300 mb-2`}>{grade}</div>
          <div className="text-xl text-slate-300">{correct} / {resultQuestions.length} נכונות</div>
          <div className={`mt-3 text-${verdict.color}-300 font-bold`}>{verdict.txt}</div>
        </div>

        <h2 className="font-bold text-xl mb-4">סקירה</h2>
        <div className="space-y-3 mb-6 safe-scroll">
          {resultQuestions.map((q, i) => {
            const userAns = answers[i];
            const isOk = userAns === q.a;
            return (
              <button key={i} onClick={() => setShowRevision(showRevision === i ? null : i)}
                className="w-full text-right p-4 rounded-xl bg-slate-900 border border-slate-800 hover:border-slate-700 transition-colors">
                <div className="flex items-center gap-2 mb-1">
                  {isOk ? <Check className="w-5 h-5 text-emerald-400" /> : <X className="w-5 h-5 text-pink-400" />}
                  <div className="text-xs text-slate-400">{i + 1}. {LESSONS[q.topic].title}</div>
                </div>
                <div className="text-sm" dir="auto">{q.q}</div>
                {showRevision === i && (
                  <div className="mt-3 pt-3 border-t border-slate-800 text-sm space-y-2">
                    <div>תשובה שלך: <span className={`font-mono ${isOk ? 'text-emerald-300' : 'text-pink-300'}`} dir="auto">{userAns || 'לא ענית'}</span></div>
                    {!isOk && <div>נכון: <span className="font-mono text-emerald-300" dir="auto">{q.a}</span></div>}
                    {q.explain && q.explain.length > 0 && (
                      <div className="mt-3 pt-3 border-t border-slate-800">
                        <div className="flex items-center gap-2 text-xs font-bold text-cyan-300 mb-2">
                          <BookOpen className="w-3 h-3" /> איך פותרים?
                        </div>
                        <div className="space-y-1 text-xs text-slate-300">
                          {q.explain.map((line, li) => (
                            <div key={li}><FormattedLine text={line} /></div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </button>
            );
          })}
        </div>


        {grade >= 70 && (
          <div className="mb-6 p-5 rounded-2xl bg-emerald-900/20 border border-emerald-500/30">
            <div className="font-black text-emerald-300 text-lg mb-2">כל הכבוד</div>
            <p className="text-slate-300 leading-relaxed">ניתן להמשיך לנושא הבא</p>
          </div>
        )}

        {grade < 70 && (
          <div className="mb-6 p-5 rounded-2xl bg-amber-900/20 border border-amber-500/30">
            <div className="font-black text-amber-300 text-lg mb-2">המלצה אישית</div>
            <p className="text-slate-300 leading-relaxed">
              הציון מתחת ל-70. מומלץ לחזור ללמוד את הנושאים שבהם טעית, ואז לבצע מבחן חוזר.
            </p>
            <div className="mt-4 flex flex-col sm:flex-row gap-3">
              <button onClick={() => setView({ name: 'dashboard' })} className="flex-1 px-5 py-3 rounded-xl bg-cyan-700 hover:bg-cyan-600 font-bold">
                ללמוד שוב
              </button>
              <button onClick={buildExam} className="flex-1 px-5 py-3 rounded-xl bg-amber-600 hover:bg-amber-500 font-bold">
                מבחן חוזר
              </button>
            </div>
          </div>
        )}

        <div className="flex gap-3">
          <button onClick={buildExam}
            className="flex-1 px-5 py-3 rounded-xl bg-gradient-to-l from-amber-600 to-orange-600 font-bold hover:scale-[1.02] transition-transform">
            בגרות חדשה
          </button>
          <button onClick={() => setView({ name: 'dashboard' })}
            className="px-5 py-3 rounded-xl bg-slate-800 hover:bg-slate-700">
            לוח הבית
          </button>
        </div>
      </div>
    </div>
  );
};

// ============== PROGRESS VIEW ==============
const ProgressView = ({ userData, setView }) => {
  if (!userData) return null;
  const topics = LESSON_ORDER;
  return (
    <div className="min-h-screen bg-slate-950 text-white p-6" dir="rtl">
      <div className="max-w-4xl mx-auto">
        <div className="flex items-center justify-between mb-6">
          <button onClick={() => setView({ name: 'dashboard' })} className="text-slate-400 hover:text-white flex items-center gap-2">
            <ChevronRight className="w-5 h-5" /> חזרה
          </button>
          <h1 className="text-2xl font-bold">ההתקדמות שלי</h1>
          <div></div>
        </div>

        <div className="grid md:grid-cols-2 gap-4 mb-6">
          {topics.map(t => {
            const lesson = LESSONS[t];
            const Icon = lesson.icon;
            const level = userData.bloomLevels?.[t] || 2;
            const log = (userData.activityLog || []).filter(a => a.topic === t && a.type === 'question');
            const total = log.length;
            const correct = log.filter(a => a.correct).length;
            const acc = total > 0 ? Math.round((correct / total) * 100) : 0;
            return (
              <div key={t} className="p-5 rounded-2xl bg-slate-900 border border-slate-800">
                <div className="flex items-center gap-3 mb-3">
                  <div className={`w-10 h-10 rounded-lg bg-${lesson.color}-900/40 border border-${lesson.color}-500/30 flex items-center justify-center`}>
                    <Icon className={`w-5 h-5 text-${lesson.color}-400`} />
                  </div>
                  <h3 className="font-bold">{lesson.title}</h3>
                </div>
                <div className="grid grid-cols-3 gap-2 text-sm">
                  <div>
                    <div className="text-xs text-slate-400">תרגלת</div>
                    <div className="font-bold">{total}</div>
                  </div>
                  <div>
                    <div className="text-xs text-slate-400">דיוק</div>
                    <div className="font-bold text-emerald-300">{acc}%</div>
                  </div>
                  <div>
                    <div className="text-xs text-slate-400">רמת בלום</div>
                    <div className={`font-bold text-${lesson.color}-300`}>{BLOOM_NAMES[level]}</div>
                  </div>
                </div>
                <div className="mt-3 flex gap-1">
                  {[1, 2, 3, 4, 5, 6].map(lv => (
                    <div key={lv} className={`flex-1 h-1.5 rounded ${lv <= level ? `bg-gradient-to-l ${BLOOM_COLORS[level]}` : 'bg-slate-800'}`}></div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {userData.bagrutHistory?.length > 0 && (
          <div className="p-5 rounded-2xl bg-slate-900 border border-slate-800">
            <h3 className="font-bold mb-3 flex items-center gap-2"><FileText className="w-5 h-5 text-amber-400" /> היסטוריית בגרויות</h3>
            <div className="space-y-2">
              {userData.bagrutHistory.slice().reverse().slice(0, 10).map((h, i) => (
                <div key={i} className="flex items-center justify-between p-3 rounded-lg bg-slate-800">
                  <span className="text-sm text-slate-400">{new Date(h.time).toLocaleDateString('he-IL')}</span>
                  <span className="font-mono">{h.score}/{h.total}</span>
                  <span className={`text-lg font-black ${h.grade >= 85 ? 'text-emerald-300' :
                      h.grade >= 70 ? 'text-cyan-300' :
                        h.grade >= 55 ? 'text-amber-300' :
                          'text-pink-300'}`}>{h.grade}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ============== TEACHER DASHBOARD ==============
const TeacherDashboard = ({ user, setView, onLogout }) => {
  const [students, setStudents] = useState([]);
  const [selectedStudent, setSelectedStudent] = useState(null);

  useEffect(() => {
    loadStudents();
  }, []);

  const loadStudents = async () => {
    const accounts = await safeGet('accounts', {});
    const studentEmails = Object.keys(accounts).filter(e => accounts[e].role === 'student');
    const studentData = await Promise.all(studentEmails.map(async email => {
      const data = await safeGet(`user:${email}`, null);
      return { email, data };
    }));
    setStudents(studentData);
  };

  if (selectedStudent) {
    const { email, data } = selectedStudent;
    return (
      <div className="min-h-screen bg-slate-950 text-white p-6" dir="rtl">
        <div className="max-w-4xl mx-auto">
          <button onClick={() => setSelectedStudent(null)} className="text-cyan-400 mb-4 flex items-center gap-2">
            <ChevronRight className="w-5 h-5" /> חזרה
          </button>
          <h1 className="text-2xl font-bold mb-4">{email}</h1>
          {data ? (
            <>
              <div className="grid md:grid-cols-3 gap-4 mb-6">
                <StatCard icon={Target} label="שאלות נכונות" value={`${data.correct || 0}/${data.attempts || 0}`} color="emerald" />
                <StatCard icon={Trophy} label="שיא משחק" value={data.highScore || 0} color="amber" />
                <StatCard icon={Award} label="בגרויות" value={data.bagrutHistory?.length || 0} color="violet" />
              </div>
              <h3 className="font-bold mb-3">רמות בלום:</h3>
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
                {LESSON_ORDER.map(t => (
                  <div key={t} className="p-3 rounded-xl bg-slate-900 border border-slate-800">
                    <div className="text-xs text-slate-400 mb-1">{LESSONS[t].title}</div>
                    <div className="font-bold text-cyan-300">{BLOOM_NAMES[data.bloomLevels?.[t] || 2]}</div>
                  </div>
                ))}
              </div>
              <h3 className="font-bold mb-3">פעילות אחרונה:</h3>
              <div className="space-y-2 max-h-96 overflow-y-auto">
                {(data.activityLog || []).slice().reverse().slice(0, 30).map((a, i) => (
                  <div key={i} className="p-2 rounded bg-slate-900 border border-slate-800 text-sm flex justify-between">
                    <span>{a.type === 'question' ? `שאלה ${a.correct ? '✓' : '✗'} (${LESSONS[a.topic]?.title})` :
                      a.type === 'lesson_done' ? `סיים שיעור: ${LESSONS[a.topic]?.title}` :
                        a.type === 'game' ? `משחק: ${a.score} (גל ${a.wave})` :
                          a.type === 'bagrut' ? `בגרות: ${a.grade}` : a.type}</span>
                    <span className="text-slate-500 text-xs">{new Date(a.time).toLocaleString('he-IL')}</span>
                  </div>
                ))}
              </div>
            </>
          ) : <div>אין נתונים זמינים</div>}
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-slate-950 text-white p-6" dir="rtl">
      <div className="max-w-5xl mx-auto">
        <div className="flex items-center justify-between mb-8">
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-violet-500 to-pink-600 flex items-center justify-center">
              <Users className="w-6 h-6 text-white" />
            </div>
            <div>
              <h1 className="text-2xl font-black">לוח מורה</h1>
              <p className="text-xs text-violet-300 font-mono">{user.email}</p>
            </div>
          </div>
          <button onClick={onLogout} className="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm flex items-center gap-2">
            <LogOut className="w-4 h-4" /> יציאה
          </button>
        </div>

        <h2 className="text-xl font-bold mb-4">תלמידים רשומים ({students.length})</h2>
        {students.length === 0 ? (
          <div className="p-8 text-center text-slate-400 bg-slate-900 rounded-2xl border border-slate-800">
            עוד לא נרשמו תלמידים. הם יופיעו כאן אחרי שיצרו חשבון.
          </div>
        ) : (
          <div className="grid md:grid-cols-2 gap-4">
            {students.map(s => (
              <button key={s.email} onClick={() => setSelectedStudent(s)}
                className="text-right p-5 rounded-2xl bg-slate-900 border border-slate-800 hover:border-violet-500/50 transition-all">
                <div className="font-bold mb-2 font-mono text-sm" dir="ltr">{s.email}</div>
                {s.data && (
                  <div className="grid grid-cols-2 gap-2 text-sm">
                    <div className="text-slate-400">שאלות: <span className="text-white">{s.data.attempts || 0}</span></div>
                    <div className="text-slate-400">דיוק: <span className="text-emerald-300">{s.data.attempts ? Math.round((s.data.correct / s.data.attempts) * 100) : 0}%</span></div>
                    <div className="text-slate-400">בגרויות: <span className="text-amber-300">{s.data.bagrutHistory?.length || 0}</span></div>
                    <div className="text-slate-400">שיא משחק: <span className="text-pink-300">{s.data.highScore || 0}</span></div>
                  </div>
                )}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

/* =========================================================
   ============== MAIN APP =================================
   ========================================================= */
function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState({ name: 'dashboard' });
  const [userData, updateUser] = useUserData(user?.id);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    safeSet('current_user', null).finally(() => setLoading(false));
  }, []);

  const onLogin = async (u) => {
    await safeSet('current_user', null);
    setUser(u);
    setView({ name: 'dashboard' });
  };

  const onLogout = async () => {
    await safeSet('current_user', null);
    setUser(null);
    setView({ name: 'dashboard' });
  };

  if (loading) {
    return (
      <div className="min-h-screen bg-slate-950 flex items-center justify-center text-cyan-300 font-mono">
        Loading...
      </div>
    );
  }

  if (!user) return <LoginScreen onLogin={onLogin} />;

  if (user.role === 'teacher' && view.name === 'dashboard') {
    return <TeacherDashboard user={user} setView={setView} onLogout={onLogout} />;
  }

  if (!userData) {
    return (
      <div className="min-h-screen bg-slate-950 flex items-center justify-center text-cyan-300 font-mono">
        Loading user data...
      </div>
    );
  }

  switch (view.name) {
    case 'lesson':
      return <LessonView topic={view.topic} userData={userData} updateUser={updateUser} setView={setView} />;
    case 'practice':
      return <PracticeView topic={view.topic} userData={userData} updateUser={updateUser} setView={setView} />;
    case 'game':
      return <GameView userData={userData} updateUser={updateUser} setView={setView} />;
    case 'bagrut':
      return <BagrutView userData={userData} updateUser={updateUser} setView={setView} />;
    case 'progress':
      return <ProgressView userData={userData} setView={setView} />;
    default:
      return <StudentDashboard user={user} userData={userData} setView={setView} onLogout={onLogout} />;
  }
}


ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
